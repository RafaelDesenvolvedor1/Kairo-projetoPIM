version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: projeto-pim-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - projeto-pim-network

  backend:
    build: .
    container_name: projeto-pim-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app           # Sincroniza sua pasta backend local com o container
      - /app/node_modules          # Protege os módulos instalados no container
    working_dir: /app
    command: npm run dev            # Executa o script de desenvolvimento
    env_file:
      - .env                      # <-- ALTERADO AQUI! Aponta para o .env da raiz
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PORT: ${BACKEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    networks:
      - projeto-pim-network

  frontend:
    image: node:22
    container_name: projeto-pim-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app             # Sincroniza sua pasta frontend local
      - /app/node_modules           # Protege os módulos do frontend
    environment:
      - VITE_API_PORT=${VITE_API_PORT}
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "5173:5173"
    # O --host garante que o Vite aceite conexões de fora do container
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - projeto-pim-network

volumes:
  mysql_data:

networks:
  projeto-pim-network:
    driver: bridge