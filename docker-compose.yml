version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: projeto-pim-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kairodb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - projeto-pim-network

  backend:
    build: .
    container_name: projeto-pim-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app              # Sincroniza sua pasta backend local com o container
      - /app/node_modules           # Protege os módulos instalados no container
    working_dir: /app
    command: npm run dev            # Executa o script de desenvolvimento
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: user
      DB_PASS: password
      DB_NAME: kairodb
      PORT: 3000
      JWT_SECRET: my-super-secret-key
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    networks:
      - projeto-pim-network

  frontend:
    image: node:22
    container_name: projeto-pim-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app             # Sincroniza sua pasta frontend local
      - /app/node_modules           # Protege os módulos do frontend
    environment:
      - VITE_API_PORT=3000
      - VITE_API_URL=/api
    ports:
      - "5173:5173"
    # O --host garante que o Vite aceite conexões de fora do container
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - projeto-pim-network

volumes:
  mysql_data:

networks:
  projeto-pim-network:
    driver: bridge